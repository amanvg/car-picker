<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Seattle Weather — amanvg</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #141414;
      --surface: #1e1e1e;
      --surface-hover: #252525;
      --border: #2e2e2e;
      --border-hover: #3d3d3d;
      --text-primary: #ffffff;
      --text-secondary: #b0b0b0;
      --text-tertiary: #606060;
      --radius-card: 20px;
      --radius-pill: 999px;
      --shadow-md: 0 4px 6px -1px rgba(0,0,0,0.4), 0 10px 40px -4px rgba(0,0,0,0.5);
    }

    html { scroll-behavior: smooth; }

    body {
      font-family: 'Inter', system-ui, sans-serif;
      background: var(--bg);
      color: var(--text-primary);
      min-height: 100vh;
      -webkit-font-smoothing: antialiased;
    }

    nav {
      position: sticky;
      top: 0;
      z-index: 100;
      background: rgba(13,13,13,0.85);
      backdrop-filter: blur(16px);
      -webkit-backdrop-filter: blur(16px);
      border-bottom: 1px solid var(--border);
    }

    .nav-inner {
      max-width: 960px;
      margin: 0 auto;
      padding: 0 32px;
      height: 56px;
      display: flex;
      align-items: center;
      justify-content: space-between;
    }

    .nav-back {
      font-size: 13px;
      font-weight: 500;
      color: var(--text-secondary);
      text-decoration: none;
      padding: 6px 12px;
      border-radius: 8px;
      transition: color 0.15s, background 0.15s;
    }

    .nav-back:hover {
      color: var(--text-primary);
      background: var(--border);
    }

    .nav-title {
      font-size: 17px;
      font-weight: 800;
      letter-spacing: -0.03em;
    }

    .main {
      max-width: 960px;
      margin: 0 auto;
      padding: 48px 32px 80px;
    }

    /* Hero card */
    .hero-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius-card);
      box-shadow: var(--shadow-md);
      padding: 40px;
      margin-bottom: 24px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 24px;
    }

    .hero-left {}

    .hero-city {
      font-size: 13px;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.08em;
      color: var(--text-tertiary);
      margin-bottom: 8px;
    }

    .hero-temp {
      font-size: 80px;
      font-weight: 800;
      letter-spacing: -0.04em;
      line-height: 1;
      margin-bottom: 8px;
    }

    .hero-desc {
      font-size: 18px;
      font-weight: 500;
      color: var(--text-secondary);
    }

    .hero-icon {
      font-size: 96px;
      line-height: 1;
      flex-shrink: 0;
    }

    /* Stats row */
    .stats {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(180px, 1fr));
      gap: 16px;
      margin-bottom: 24px;
    }

    .stat-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 16px;
      padding: 20px;
    }

    .stat-label {
      font-size: 11px;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.08em;
      color: var(--text-tertiary);
      margin-bottom: 6px;
    }

    .stat-value {
      font-size: 24px;
      font-weight: 700;
      letter-spacing: -0.02em;
    }

    .stat-unit {
      font-size: 14px;
      font-weight: 500;
      color: var(--text-secondary);
      margin-left: 2px;
    }

    /* Forecast */
    .section-label {
      font-size: 13px;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.08em;
      color: var(--text-tertiary);
      margin-bottom: 12px;
    }

    .forecast {
      display: grid;
      grid-template-columns: repeat(7, 1fr);
      gap: 10px;
    }

    .forecast-day {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 16px;
      padding: 16px 10px;
      text-align: center;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 8px;
    }

    .forecast-name {
      font-size: 11px;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.06em;
      color: var(--text-tertiary);
    }

    .forecast-icon {
      font-size: 28px;
    }

    .forecast-high {
      font-size: 16px;
      font-weight: 700;
    }

    .forecast-low {
      font-size: 13px;
      color: var(--text-tertiary);
    }

    /* Loading / error */
    .state-msg {
      text-align: center;
      padding: 80px 32px;
      color: var(--text-tertiary);
      font-size: 15px;
    }

    .updated {
      margin-top: 32px;
      font-size: 12px;
      color: var(--text-tertiary);
      text-align: right;
    }

    @media (max-width: 640px) {
      .main { padding: 32px 20px 60px; }
      .nav-inner { padding: 0 20px; }
      .hero-card { flex-direction: column; align-items: flex-start; padding: 28px; }
      .hero-temp { font-size: 64px; }
      .hero-icon { font-size: 64px; }
      .forecast { grid-template-columns: repeat(4, 1fr); }
    }
  </style>
</head>
<body>

  <nav>
    <div class="nav-inner">
      <a class="nav-back" href="/">← amanvg</a>
      <span class="nav-title">Seattle Weather</span>
      <div style="width:80px"></div>
    </div>
  </nav>

  <main class="main" id="app">
    <div class="state-msg">Loading weather…</div>
  </main>

  <script>
    // Seattle coordinates
    const LAT = 47.6062;
    const LON = -122.3321;

    const WMO = {
      0:  ['☀️',  'Clear'],
      1:  ['🌤️', 'Mostly clear'],
      2:  ['⛅',  'Partly cloudy'],
      3:  ['☁️',  'Overcast'],
      45: ['🌫️', 'Foggy'],
      48: ['🌫️', 'Icy fog'],
      51: ['🌦️', 'Light drizzle'],
      53: ['🌦️', 'Drizzle'],
      55: ['🌧️', 'Heavy drizzle'],
      61: ['🌧️', 'Light rain'],
      63: ['🌧️', 'Rain'],
      65: ['🌧️', 'Heavy rain'],
      71: ['🌨️', 'Light snow'],
      73: ['🌨️', 'Snow'],
      75: ['❄️',  'Heavy snow'],
      77: ['🌨️', 'Snow grains'],
      80: ['🌦️', 'Showers'],
      81: ['🌧️', 'Heavy showers'],
      82: ['⛈️',  'Violent showers'],
      85: ['🌨️', 'Snow showers'],
      86: ['🌨️', 'Heavy snow showers'],
      95: ['⛈️',  'Thunderstorm'],
      96: ['⛈️',  'Thunderstorm + hail'],
      99: ['⛈️',  'Thunderstorm + hail'],
    };

    function wmo(code) {
      return WMO[code] || ['🌡️', 'Unknown'];
    }

    function c2f(c) { return Math.round(c * 9/5 + 32); }

    function dayName(dateStr, i) {
      if (i === 0) return 'Today';
      if (i === 1) return 'Tomorrow';
      return new Date(dateStr).toLocaleDateString('en-US', { weekday: 'short' });
    }

    async function load() {
      const app = document.getElementById('app');
      try {
        const url = `https://api.open-meteo.com/v1/forecast?latitude=${LAT}&longitude=${LON}`
          + `&current=temperature_2m,apparent_temperature,weathercode,windspeed_10m,relativehumidity_2m,precipitation_probability`
          + `&daily=weathercode,temperature_2m_max,temperature_2m_min,precipitation_probability_max`
          + `&temperature_unit=fahrenheit&wind_speed_unit=mph&timezone=America%2FLos_Angeles&forecast_days=7`;

        const res = await fetch(url);
        if (!res.ok) throw new Error('API error');
        const d = await res.json();

        const c = d.current;
        const daily = d.daily;
        const [icon, desc] = wmo(c.weathercode);

        const now = new Date().toLocaleTimeString('en-US', { hour: 'numeric', minute: '2-digit' });

        app.innerHTML = `
          <div class="hero-card">
            <div class="hero-left">
              <div class="hero-city">Seattle, WA</div>
              <div class="hero-temp">${Math.round(c.temperature_2m)}°</div>
              <div class="hero-desc">${desc} · Feels like ${Math.round(c.apparent_temperature)}°</div>
            </div>
            <div class="hero-icon">${icon}</div>
          </div>

          <div class="stats">
            <div class="stat-card">
              <div class="stat-label">Humidity</div>
              <div class="stat-value">${c.relativehumidity_2m}<span class="stat-unit">%</span></div>
            </div>
            <div class="stat-card">
              <div class="stat-label">Wind</div>
              <div class="stat-value">${Math.round(c.windspeed_10m)}<span class="stat-unit">mph</span></div>
            </div>
            <div class="stat-card">
              <div class="stat-label">Rain chance</div>
              <div class="stat-value">${c.precipitation_probability ?? daily.precipitation_probability_max[0]}<span class="stat-unit">%</span></div>
            </div>
          </div>

          <div class="section-label">7-Day Forecast</div>
          <div class="forecast">
            ${daily.time.map((date, i) => {
              const [fIcon] = wmo(daily.weathercode[i]);
              return `
                <div class="forecast-day">
                  <div class="forecast-name">${dayName(date, i)}</div>
                  <div class="forecast-icon">${fIcon}</div>
                  <div class="forecast-high">${Math.round(daily.temperature_2m_max[i])}°</div>
                  <div class="forecast-low">${Math.round(daily.temperature_2m_min[i])}°</div>
                </div>
              `;
            }).join('')}
          </div>

          <div class="updated">Updated at ${now} · Open-Meteo</div>
        `;
      } catch (e) {
        app.innerHTML = `<div class="state-msg">Couldn't load weather data.<br>Check your connection and try refreshing.</div>`;
      }
    }

    load();

    // Refresh every 10 minutes
    setInterval(load, 10 * 60 * 1000);
  </script>

</body>
</html>
