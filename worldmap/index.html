<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Countries Visited — amanvg</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet" />
  <style>
    :root {
      --bg: #141414;
      --surface: #1e1e1e;
      --border: #2e2e2e;
      --text-primary: #ffffff;
      --text-secondary: #b0b0b0;
      --text-tertiary: #606060;
      --visited: #ef4444;
      --radius-card: 20px;
    }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background: var(--bg);
      color: var(--text-primary);
      font-family: 'Inter', system-ui, sans-serif;
      -webkit-font-smoothing: antialiased;
      min-height: 100vh;
    }

    nav {
      position: sticky;
      top: 0;
      z-index: 100;
      backdrop-filter: blur(16px);
      -webkit-backdrop-filter: blur(16px);
      background: rgba(20, 20, 20, 0.85);
      border-bottom: 1px solid var(--border);
    }
    .nav-inner {
      max-width: 1280px;
      margin: 0 auto;
      padding: 0 24px;
      height: 56px;
      display: flex;
      align-items: center;
      gap: 24px;
    }
    .nav-logo {
      font-size: 1.05rem;
      font-weight: 700;
      color: var(--text-primary);
      text-decoration: none;
      letter-spacing: -0.02em;
    }
    .nav-logo span { opacity: 0.45; }
    .nav-back {
      font-size: 0.85rem;
      font-weight: 500;
      color: var(--text-secondary);
      text-decoration: none;
      transition: color 0.15s;
    }
    .nav-back:hover { color: var(--text-primary); }

    main {
      max-width: 1280px;
      margin: 0 auto;
      padding: 48px 24px 80px;
    }

    .page-header { margin-bottom: 40px; }
    .page-header h1 {
      font-size: 2rem;
      font-weight: 800;
      letter-spacing: -0.04em;
      margin-bottom: 8px;
    }
    .page-header p { color: var(--text-secondary); font-size: 0.95rem; }

    .stats {
      display: flex;
      gap: 16px;
      margin-bottom: 40px;
      flex-wrap: wrap;
    }
    .stat-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius-card);
      padding: 20px 28px;
      min-width: 140px;
    }
    .stat-card .value {
      font-size: 2rem;
      font-weight: 800;
      letter-spacing: -0.04em;
    }
    .stat-card .label {
      font-size: 0.8rem;
      color: var(--text-secondary);
      margin-top: 2px;
    }
    .stat-card.visited .value { color: var(--visited); }

    .legend {
      display: flex;
      gap: 20px;
      margin-bottom: 28px;
      flex-wrap: wrap;
    }
    .legend-item {
      display: flex;
      align-items: center;
      gap: 8px;
      font-size: 0.85rem;
      color: var(--text-secondary);
    }
    .legend-swatch {
      width: 16px;
      height: 16px;
      border-radius: 4px;
      border: 1px solid rgba(255,255,255,0.15);
    }
    .legend-swatch.visited { background: var(--visited); }
    .legend-swatch.unvisited { background: #333; border-color: #555; }

    .map-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius-card);
      padding: 32px;
      box-shadow: 0 4px 24px rgba(0,0,0,0.4);
    }

    #world-map {
      width: 100%;
      height: auto;
      display: block;
    }

    .country-path {
      stroke: #222;
      stroke-width: 0.4;
      stroke-linejoin: round;
      cursor: pointer;
      transition: opacity 0.15s;
    }
    .country-path.visited { fill: var(--visited); }
    .country-path.unvisited { fill: #3a3a3a; }
    .country-path:hover { opacity: 0.72; }

    #tooltip {
      position: fixed;
      background: rgba(30,30,30,0.97);
      border: 1px solid var(--border);
      border-radius: 10px;
      padding: 8px 14px;
      font-size: 0.85rem;
      font-weight: 600;
      color: var(--text-primary);
      pointer-events: none;
      opacity: 0;
      transition: opacity 0.1s;
      z-index: 200;
      white-space: nowrap;
    }
    #tooltip .tip-status {
      font-size: 0.75rem;
      font-weight: 400;
      margin-top: 2px;
    }
    #tooltip .tip-status.visited { color: var(--visited); }
    #tooltip .tip-status.unvisited { color: var(--text-tertiary); }

    .country-grid {
      margin-top: 16px;
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(180px, 1fr));
      gap: 8px;
    }
    .country-chip {
      display: flex;
      align-items: center;
      gap: 8px;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 10px;
      padding: 8px 12px;
      font-size: 0.82rem;
      font-weight: 500;
      color: var(--text-secondary);
    }
    .country-chip .dot {
      width: 8px;
      height: 8px;
      border-radius: 50%;
      flex-shrink: 0;
    }
    .country-chip.visited { border-color: rgba(239,68,68,0.35); }
    .country-chip.visited .dot { background: var(--visited); }
    .country-chip.unvisited .dot { background: #3a3a3a; border: 1px solid #555; }

    .section-label {
      font-size: 0.75rem;
      font-weight: 600;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      color: var(--text-tertiary);
      margin: 32px 0 12px;
    }

    @media (max-width: 640px) {
      .page-header h1 { font-size: 1.5rem; }
      .map-card { padding: 12px; }
    }
  </style>
</head>
<body>

<nav>
  <div class="nav-inner">
    <a href="/" class="nav-logo">aman<span>vg</span></a>
    <a href="/" class="nav-back">← Back</a>
  </div>
</nav>

<main>
  <div class="page-header">
    <h1>Countries Visited</h1>
    <p>Every country I've set foot in, mapped out.</p>
  </div>

  <div class="stats">
    <div class="stat-card visited">
      <div class="value" id="visited-count">—</div>
      <div class="label">Countries visited</div>
    </div>
    <div class="stat-card">
      <div class="value" id="unvisited-count">—</div>
      <div class="label">Countries remaining</div>
    </div>
    <div class="stat-card">
      <div class="value" id="pct">—</div>
      <div class="label">of the world</div>
    </div>
  </div>

  <div class="legend">
    <div class="legend-item">
      <div class="legend-swatch visited"></div>
      <span>Visited</span>
    </div>
    <div class="legend-item">
      <div class="legend-swatch unvisited"></div>
      <span>Not visited</span>
    </div>
  </div>

  <div class="map-card">
    <svg id="world-map" viewBox="0 0 960 500"></svg>
  </div>

  <p class="section-label">Visited</p>
  <div class="country-grid" id="visited-list"></div>

  <p class="section-label">Not Yet Visited</p>
  <div class="country-grid" id="unvisited-list"></div>
</main>

<div id="tooltip">
  <div id="tip-name"></div>
  <div class="tip-status" id="tip-status"></div>
</div>

<script src="https://cdn.jsdelivr.net/npm/d3@7/dist/d3.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/topojson-client@3/dist/topojson-client.min.js"></script>

<script>
// ── EDIT THIS LIST ────────────────────────────────────────────────────────
const VISITED = new Set([
  "United States of America",
  "Canada",
  "Mexico",
  "Ireland",
  "United Kingdom",
  "France",
  "Belgium",
  "Germany",
  "Netherlands",
  "Switzerland",
  "Austria",
  "Italy",
  "United Arab Emirates",
  "India",
  "Kenya",
]);
// ─────────────────────────────────────────────────────────────────────────

// ISO numeric → country name (Natural Earth names used in world-atlas)
const ID_TO_NAME = {
  4:"Afghanistan",8:"Albania",12:"Algeria",20:"Andorra",24:"Angola",
  28:"Antigua and Barbuda",32:"Argentina",36:"Australia",40:"Austria",
  31:"Azerbaijan",44:"Bahamas",48:"Bahrain",50:"Bangladesh",52:"Barbados",
  56:"Belgium",64:"Bhutan",68:"Bolivia",70:"Bosnia and Herzegovina",
  72:"Botswana",76:"Brazil",100:"Bulgaria",854:"Burkina Faso",
  108:"Burundi",116:"Cambodia",120:"Cameroon",124:"Canada",132:"Cape Verde",
  140:"Central African Republic",144:"Sri Lanka",148:"Chad",152:"Chile",
  156:"China",170:"Colombia",174:"Comoros",180:"Dem. Rep. Congo",
  178:"Congo",188:"Costa Rica",191:"Croatia",192:"Cuba",196:"Cyprus",
  203:"Czechia",208:"Denmark",262:"Djibouti",212:"Dominica",
  214:"Dominican Republic",218:"Ecuador",818:"Egypt",222:"El Salvador",
  226:"Equatorial Guinea",232:"Eritrea",233:"Estonia",231:"Ethiopia",
  242:"Fiji",246:"Finland",250:"France",266:"Gabon",288:"Ghana",
  300:"Greece",308:"Grenada",320:"Guatemala",324:"Guinea",
  624:"Guinea-Bissau",328:"Guyana",332:"Haiti",340:"Honduras",
  348:"Hungary",356:"India",360:"Indonesia",364:"Iran",368:"Iraq",
  372:"Ireland",376:"Israel",380:"Italy",388:"Jamaica",392:"Japan",
  400:"Jordan",398:"Kazakhstan",404:"Kenya",296:"Kiribati",408:"North Korea",
  410:"South Korea",414:"Kuwait",417:"Kyrgyzstan",418:"Laos",422:"Lebanon",
  426:"Lesotho",430:"Liberia",434:"Libya",440:"Lithuania",442:"Luxembourg",
  450:"Madagascar",454:"Malawi",458:"Malaysia",462:"Maldives",466:"Mali",
  470:"Malta",584:"Marshall Islands",478:"Mauritania",480:"Mauritius",
  484:"Mexico",583:"Micronesia",498:"Moldova",496:"Mongolia",504:"Morocco",
  508:"Mozambique",516:"Namibia",524:"Nepal",528:"Netherlands",
  554:"New Zealand",558:"Nicaragua",562:"Niger",566:"Nigeria",
  578:"Norway",512:"Oman",586:"Pakistan",585:"Palau",591:"Panama",
  598:"Papua New Guinea",600:"Paraguay",604:"Peru",608:"Philippines",
  616:"Poland",620:"Portugal",634:"Qatar",642:"Romania",643:"Russia",
  646:"Rwanda",659:"Saint Kitts and Nevis",662:"Saint Lucia",
  670:"Saint Vincent and the Grenadines",882:"Samoa",674:"San Marino",
  678:"São Tomé and Príncipe",682:"Saudi Arabia",686:"Senegal",
  690:"Seychelles",694:"Sierra Leone",703:"Slovakia",705:"Slovenia",
  090:"Solomon Islands",706:"Somalia",710:"South Africa",
  728:"South Sudan",724:"Spain",729:"Sudan",740:"Suriname",
  748:"Eswatini",752:"Sweden",756:"Switzerland",760:"Syria",
  762:"Tajikistan",764:"Thailand",626:"East Timor",768:"Togo",
  776:"Tonga",780:"Trinidad and Tobago",788:"Tunisia",792:"Turkey",
  795:"Turkmenistan",798:"Tuvalu",800:"Uganda",804:"Ukraine",
  784:"United Arab Emirates",826:"United Kingdom",840:"United States of America",
  858:"Uruguay",860:"Uzbekistan",548:"Vanuatu",862:"Venezuela",
  704:"Vietnam",887:"Yemen",894:"Zambia",716:"Zimbabwe",
  // Additional
  8:"Albania",51:"Armenia",268:"Georgia",682:"Saudi Arabia",
  275:"Palestine",688:"Serbia",807:"North Macedonia",238:"Falkland Islands",
  388:"Jamaica",780:"Trinidad and Tobago",
};

const tooltip   = document.getElementById('tooltip');
const tipName   = document.getElementById('tip-name');
const tipStatus = document.getElementById('tip-status');

function showTip(e, name) {
  const isV = VISITED.has(name);
  tipName.textContent = name;
  tipStatus.textContent = isV ? '✓ Visited' : 'Not visited';
  tipStatus.className = `tip-status ${isV ? 'visited' : 'unvisited'}`;
  tooltip.style.opacity = '1';
  tooltip.style.left = (e.clientX + 14) + 'px';
  tooltip.style.top  = (e.clientY - 10) + 'px';
}
function moveTip(e) {
  tooltip.style.left = (e.clientX + 14) + 'px';
  tooltip.style.top  = (e.clientY - 10) + 'px';
}
function hideTip() { tooltip.style.opacity = '0'; }

const W = 960, H = 500;
const svg = d3.select('#world-map').attr('viewBox', `0 0 ${W} ${H}`);
const projection = d3.geoNaturalEarth1().scale(153).translate([W / 2, H / 2]);
const pathGen = d3.geoPath().projection(projection);

// Ocean background
svg.append('path')
  .datum({type: 'Sphere'})
  .attr('fill', '#1a1a1a')
  .attr('stroke', '#333')
  .attr('stroke-width', 0.5)
  .attr('d', pathGen);

// Graticule
svg.append('path')
  .datum(d3.geoGraticule()())
  .attr('fill', 'none')
  .attr('stroke', '#252525')
  .attr('stroke-width', 0.4)
  .attr('d', pathGen);

d3.json('https://cdn.jsdelivr.net/npm/world-atlas@2/countries-110m.json').then(world => {
  const countries = topojson.feature(world, world.objects.countries);

  svg.selectAll('.country-path')
    .data(countries.features)
    .enter()
    .append('path')
    .attr('class', d => {
      const name = ID_TO_NAME[+d.id];
      return `country-path ${name && VISITED.has(name) ? 'visited' : 'unvisited'}`;
    })
    .attr('d', pathGen)
    .on('mousemove', (e, d) => {
      const name = ID_TO_NAME[+d.id];
      if (name) { showTip(e, name); moveTip(e); }
    })
    .on('mouseleave', hideTip);

  // Borders
  svg.append('path')
    .datum(topojson.mesh(world, world.objects.countries, (a, b) => a !== b))
    .attr('fill', 'none')
    .attr('stroke', '#141414')
    .attr('stroke-width', 0.5)
    .attr('d', pathGen);

  // Build unique sorted country name list from what's actually in the map
  const allNames = [...new Set(
    countries.features.map(d => ID_TO_NAME[+d.id]).filter(Boolean)
  )].sort();

  const visitedCount = allNames.filter(n => VISITED.has(n)).length;
  const total = allNames.length;

  document.getElementById('visited-count').textContent = visitedCount;
  document.getElementById('unvisited-count').textContent = total - visitedCount;
  document.getElementById('pct').textContent = Math.round(visitedCount / total * 100) + '%';

  const visitedList   = document.getElementById('visited-list');
  const unvisitedList = document.getElementById('unvisited-list');

  allNames.forEach(name => {
    const isV = VISITED.has(name);
    const chip = document.createElement('div');
    chip.className = `country-chip ${isV ? 'visited' : 'unvisited'}`;
    chip.innerHTML = `<span class="dot"></span>${name}`;
    (isV ? visitedList : unvisitedList).appendChild(chip);
  });
});
</script>
</body>
</html>
