<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>amanvg</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #141414;
      --surface: #1e1e1e;
      --surface-hover: #252525;
      --border: #2e2e2e;
      --border-hover: #3d3d3d;
      --text-primary: #ffffff;
      --text-secondary: #b0b0b0;
      --text-tertiary: #606060;
      --shadow-md: 0 4px 6px -1px rgba(0,0,0,0.4), 0 10px 40px -4px rgba(0,0,0,0.5);
      --shadow-lg: 0 8px 16px -2px rgba(0,0,0,0.5), 0 24px 64px -8px rgba(0,0,0,0.6);
      --radius-card: 20px;
      --radius-pill: 999px;
    }

    html { scroll-behavior: smooth; }

    body {
      font-family: 'Inter', system-ui, sans-serif;
      background: var(--bg);
      color: var(--text-primary);
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      -webkit-font-smoothing: antialiased;
    }

    /* ─────────────────────────────────────────
       NAV
    ───────────────────────────────────────── */
    nav {
      position: sticky;
      top: 0;
      z-index: 100;
      background: rgba(13, 13, 13, 0.85);
      backdrop-filter: blur(16px);
      -webkit-backdrop-filter: blur(16px);
      border-bottom: 1px solid var(--border);
    }

    .nav-inner {
      max-width: 960px;
      margin: 0 auto;
      padding: 0 32px;
      height: 56px;
      display: flex;
      align-items: center;
      justify-content: space-between;
    }

    .nav-logo {
      font-size: 17px;
      font-weight: 800;
      letter-spacing: -0.03em;
      color: var(--text-primary);
      text-decoration: none;
    }

    .nav-logo span { color: var(--text-tertiary); }

    .nav-links {
      display: flex;
      gap: 4px;
      list-style: none;
    }

    .nav-links a {
      font-size: 13px;
      font-weight: 500;
      color: var(--text-secondary);
      text-decoration: none;
      padding: 6px 12px;
      border-radius: 8px;
      transition: color 0.15s, background 0.15s;
    }

    .nav-links a:hover {
      color: var(--text-primary);
      background: var(--border);
    }

    /* ─────────────────────────────────────────
       PROJECTS
    ───────────────────────────────────────── */
    .projects {
      max-width: 960px;
      width: 100%;
      margin: 0 auto;
      padding: 40px 32px 80px;
      flex: 1;
    }

    .grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
      gap: 16px;
    }

    /* ── Project card ── */
    .card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius-card);
      box-shadow: var(--shadow-md);
      padding: 28px;
      text-decoration: none;
      color: inherit;
      display: flex;
      flex-direction: column;
      transition: transform 0.2s cubic-bezier(0.34, 1.56, 0.64, 1),
                  box-shadow 0.2s,
                  border-color 0.2s;
      overflow: hidden;
      position: relative;
    }

    .card:hover {
      transform: translateY(-4px);
      box-shadow: var(--shadow-lg);
      border-color: var(--border-hover);
    }

    .card-stripe {
      position: absolute;
      top: 0; left: 0; right: 0;
      height: 3px;
      border-radius: var(--radius-card) var(--radius-card) 0 0;
    }

    .card-top {
      display: flex;
      justify-content: space-between;
      align-items: flex-start;
      margin-bottom: 16px;
    }

    .card-icon-wrap {
      width: 48px;
      height: 48px;
      border-radius: 14px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 24px;
      background: var(--bg);
      flex-shrink: 0;
    }

    .card-badge {
      font-size: 11px;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.06em;
      padding: 4px 10px;
      border-radius: var(--radius-pill);
      background: rgba(22, 163, 74, 0.15);
      color: #4ade80;
      border: 1px solid rgba(74, 222, 128, 0.25);
    }

    .card-badge.wip {
      background: rgba(217, 119, 6, 0.15);
      color: #fbbf24;
      border-color: rgba(251, 191, 36, 0.25);
    }

    .card-title {
      font-size: 20px;
      font-weight: 700;
      letter-spacing: -0.02em;
      color: var(--text-primary);
      margin-bottom: 6px;
    }

    .card-desc {
      font-size: 14px;
      color: var(--text-secondary);
      line-height: 1.6;
      margin-bottom: 20px;
      flex: 1;
    }

    .card-footer {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding-top: 16px;
      border-top: 1px solid var(--border);
    }

    .card-tags {
      display: flex;
      gap: 6px;
      flex-wrap: wrap;
    }

    .tag {
      font-size: 11px;
      font-weight: 500;
      color: var(--text-tertiary);
      background: var(--bg);
      padding: 3px 9px;
      border-radius: var(--radius-pill);
      border: 1px solid var(--border);
    }

    .card-cta {
      font-size: 13px;
      font-weight: 600;
      color: var(--text-tertiary);
      display: flex;
      align-items: center;
      gap: 4px;
      transition: color 0.15s, gap 0.15s;
      white-space: nowrap;
    }

    .card:hover .card-cta {
      color: var(--text-primary);
      gap: 8px;
    }

    /* ─────────────────────────────────────────
       HERO / BIO
    ───────────────────────────────────────── */
    .hero {
      max-width: 960px;
      width: 100%;
      margin: 0 auto;
      padding: 56px 32px 0;
    }

    .hero h1 {
      font-size: 32px;
      font-weight: 800;
      letter-spacing: -0.03em;
      color: var(--text-primary);
    }

    .hero p {
      font-size: 16px;
      color: var(--text-secondary);
      margin-top: 10px;
      line-height: 1.7;
    }

    .hero-row {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 24px;
    }

    .btn-contact {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      padding: 10px 18px;
      border-radius: 12px;
      font-size: 14px;
      font-weight: 600;
      font-family: inherit;
      text-decoration: none;
      color: var(--text-primary);
      background: var(--surface);
      border: 1px solid var(--border);
      transition: background 0.15s, border-color 0.15s, transform 0.15s;
      white-space: nowrap;
      flex-shrink: 0;
    }

    .btn-contact:hover {
      background: var(--surface-hover);
      border-color: var(--border-hover);
      transform: translateY(-1px);
    }

    .btn-contact:active { transform: scale(0.97); }

    /* ─────────────────────────────────────────
       SECTION HEADER
    ───────────────────────────────────────── */
    .section-header {
      max-width: 960px;
      width: 100%;
      margin: 0 auto;
      padding: 48px 32px 0;
    }

    .section-header h2 {
      font-size: 13px;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.08em;
      color: var(--text-tertiary);
    }

    .section-divider {
      border: none;
      border-top: 1px solid var(--border);
      margin-top: 12px;
    }

    /* ─────────────────────────────────────────
       RESPONSIVE
    ───────────────────────────────────────── */
    @media (max-width: 640px) {
      .projects { padding-left: 20px; padding-right: 20px; }
      .nav-inner { padding: 0 20px; }
      .nav-links { display: none; }
      .hero { padding: 40px 20px 0; }
      .section-header { padding: 40px 20px 0; }
    }
  </style>
</head>
<body>

  <!-- NAV -->
  <nav>
    <div class="nav-inner">
      <a class="nav-logo" href="/">aman<span>vg</span></a>
      <ul class="nav-links">
        <li><a href="/mariners/">Seattle Mariners Dashboard</a></li>
      </ul>
    </div>
  </nav>

  <!-- BIO -->
  <div class="hero" id="about">
    <div class="hero-row">
      <a class="btn-contact" href="mailto:amanvg@gmail.com">✉ Contact me</a>
    </div>
  </div>

  <!-- SECTION HEADER -->
  <div class="section-header">
    <h2>Things I want to host online</h2>
    <hr class="section-divider">
  </div>

  <!-- PROJECT GRID -->
  <main class="projects" id="projects">
    <div class="grid">

      <a class="card" href="/seattlesports/">
        <div class="card-stripe" style="background: linear-gradient(90deg, #002244, #69BE28);"></div>
        <div class="card-top">
          <div class="card-icon-wrap">🏟️</div>
        </div>
        <div class="card-title">Seattle Sports</div>
        <p class="card-desc">Live scores, schedules, and standings for the Seahawks, Mariners, Kraken, and Sounders.</p>
        <div class="card-footer">
          <div class="card-tags">
          </div>
          <span class="card-cta">Open →</span>
        </div>
      </a>

      <a class="card" href="/USStates/">
        <div class="card-stripe" style="background: linear-gradient(90deg, #ef4444, #b91c1c);"></div>
        <div class="card-top">
          <div class="card-icon-wrap">🗺️</div>
        </div>
        <div class="card-title">US States I have been to</div>
        <div class="card-footer">
          <div class="card-tags">
          </div>
          <span class="card-cta">Open →</span>
        </div>
      </a>

      <a class="card" href="/worldmap/">
        <div class="card-stripe" style="background: linear-gradient(90deg, #3b82f6, #1d4ed8);"></div>
        <div class="card-top">
          <div class="card-icon-wrap">🌍</div>
        </div>
        <div class="card-title">Countries I have been to</div>
        <div class="card-footer">
          <div class="card-tags">
          </div>
          <span class="card-cta">Open →</span>
        </div>
      </a>

    </div>
  </main>

</body>
</html>
