<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>US States Visited — amanvg</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet" />
  <style>
    :root {
      --bg: #141414;
      --surface: #1e1e1e;
      --border: #2e2e2e;
      --text-primary: #ffffff;
      --text-secondary: #b0b0b0;
      --text-tertiary: #606060;
      --visited: #ef4444;
      --radius-card: 20px;
    }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background: var(--bg);
      color: var(--text-primary);
      font-family: 'Inter', system-ui, sans-serif;
      -webkit-font-smoothing: antialiased;
      min-height: 100vh;
    }

    nav {
      position: sticky;
      top: 0;
      z-index: 100;
      backdrop-filter: blur(16px);
      -webkit-backdrop-filter: blur(16px);
      background: rgba(20, 20, 20, 0.85);
      border-bottom: 1px solid var(--border);
    }
    .nav-inner {
      max-width: 1280px;
      margin: 0 auto;
      padding: 0 24px;
      height: 56px;
      display: flex;
      align-items: center;
      gap: 24px;
    }
    .nav-logo {
      font-size: 1.05rem;
      font-weight: 700;
      color: var(--text-primary);
      text-decoration: none;
      letter-spacing: -0.02em;
    }
    .nav-logo span { opacity: 0.45; }
    .nav-back {
      font-size: 0.85rem;
      font-weight: 500;
      color: var(--text-secondary);
      text-decoration: none;
      transition: color 0.15s;
    }
    .nav-back:hover { color: var(--text-primary); }

    main {
      max-width: 1280px;
      margin: 0 auto;
      padding: 48px 24px 80px;
    }

    .page-header { margin-bottom: 40px; }
    .page-header h1 {
      font-size: 2rem;
      font-weight: 800;
      letter-spacing: -0.04em;
      margin-bottom: 8px;
    }
    .page-header p { color: var(--text-secondary); font-size: 0.95rem; }

    .stats {
      display: flex;
      gap: 16px;
      margin-bottom: 40px;
      flex-wrap: wrap;
    }
    .stat-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius-card);
      padding: 20px 28px;
      min-width: 140px;
    }
    .stat-card .value {
      font-size: 2rem;
      font-weight: 800;
      letter-spacing: -0.04em;
    }
    .stat-card .label {
      font-size: 0.8rem;
      color: var(--text-secondary);
      margin-top: 2px;
    }
    .stat-card.visited .value { color: var(--visited); }

    .legend {
      display: flex;
      gap: 20px;
      margin-bottom: 28px;
      flex-wrap: wrap;
    }
    .legend-item {
      display: flex;
      align-items: center;
      gap: 8px;
      font-size: 0.85rem;
      color: var(--text-secondary);
    }
    .legend-swatch {
      width: 16px;
      height: 16px;
      border-radius: 4px;
      border: 1px solid rgba(255,255,255,0.15);
    }
    .legend-swatch.visited { background: var(--visited); }
    .legend-swatch.unvisited { background: #333; border-color: #555; }

    .map-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius-card);
      padding: 32px;
      box-shadow: 0 4px 24px rgba(0,0,0,0.4);
    }

    #map-container {
      width: 100%;
    }

    #us-map {
      width: 100%;
      height: auto;
      display: block;
    }

    .state-path {
      stroke: #141414;
      stroke-width: 0.8;
      stroke-linejoin: round;
      cursor: pointer;
      transition: opacity 0.15s;
    }
    .state-path.visited { fill: var(--visited); }
    .state-path.unvisited { fill: #3a3a3a; }
    .state-path:hover { opacity: 0.72; }

    #tooltip {
      position: fixed;
      background: rgba(30,30,30,0.97);
      border: 1px solid var(--border);
      border-radius: 10px;
      padding: 8px 14px;
      font-size: 0.85rem;
      font-weight: 600;
      color: var(--text-primary);
      pointer-events: none;
      opacity: 0;
      transition: opacity 0.1s;
      z-index: 200;
      white-space: nowrap;
    }
    #tooltip .tip-status {
      font-size: 0.75rem;
      font-weight: 400;
      margin-top: 2px;
    }
    #tooltip .tip-status.visited { color: var(--visited); }
    #tooltip .tip-status.unvisited { color: var(--text-tertiary); }

    .state-grid {
      margin-top: 16px;
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(160px, 1fr));
      gap: 8px;
    }
    .state-chip {
      display: flex;
      align-items: center;
      gap: 8px;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 10px;
      padding: 8px 12px;
      font-size: 0.82rem;
      font-weight: 500;
      color: var(--text-secondary);
    }
    .state-chip .dot {
      width: 8px;
      height: 8px;
      border-radius: 50%;
      flex-shrink: 0;
    }
    .state-chip.visited { border-color: rgba(239,68,68,0.35); }
    .state-chip.visited .dot { background: var(--visited); }
    .state-chip.unvisited .dot { background: #3a3a3a; border: 1px solid #555; }

    .section-label {
      font-size: 0.75rem;
      font-weight: 600;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      color: var(--text-tertiary);
      margin: 32px 0 12px;
    }

    @media (max-width: 640px) {
      .page-header h1 { font-size: 1.5rem; }
      .map-card { padding: 12px; }
    }
  </style>
</head>
<body>

<nav>
  <div class="nav-inner">
    <a href="/" class="nav-logo">aman<span>vg</span></a>
    <a href="/" class="nav-back">← Back</a>
  </div>
</nav>

<main>
  <div class="page-header">
    <h1>US States Visited</h1>
    <p>Every state I've set foot in, mapped out.</p>
  </div>

  <div class="stats">
    <div class="stat-card visited">
      <div class="value" id="visited-count">—</div>
      <div class="label">States visited</div>
    </div>
    <div class="stat-card">
      <div class="value" id="unvisited-count">—</div>
      <div class="label">States remaining</div>
    </div>
    <div class="stat-card">
      <div class="value" id="pct">—</div>
      <div class="label">of the country</div>
    </div>
  </div>

  <div class="legend">
    <div class="legend-item">
      <div class="legend-swatch visited"></div>
      <span>Visited</span>
    </div>
    <div class="legend-item">
      <div class="legend-swatch unvisited"></div>
      <span>Not visited</span>
    </div>
  </div>

  <div class="map-card">
    <div id="map-container">
      <svg id="us-map" viewBox="0 0 960 600"></svg>
    </div>
  </div>

  <p class="section-label">Visited</p>
  <div class="state-grid" id="visited-list"></div>

  <p class="section-label">Not Yet Visited</p>
  <div class="state-grid" id="unvisited-list"></div>
</main>

<div id="tooltip">
  <div id="tip-name"></div>
  <div class="tip-status" id="tip-status"></div>
</div>

<!-- D3 v7 -->
<script src="https://cdn.jsdelivr.net/npm/d3@7/dist/d3.min.js"></script>
<!-- TopoJSON -->
<script src="https://cdn.jsdelivr.net/npm/topojson-client@3/dist/topojson-client.min.js"></script>

<script>
// ── EDIT THIS LIST ────────────────────────────────────────────────────────
const VISITED = new Set([
  "Washington",
  "Oregon",
  "California",
  "Idaho",
  "Montana",
  "Nevada",
  "Wyoming",
  "Colorado",
  "North Dakota",
  "South Dakota",
  "Minnesota",
  "Wisconsin",
  "Illinois",
  "Indiana",
  "Ohio",
  "Pennsylvania",
  "New York",
  "New Jersey",
  "Texas",
  "Alaska",
  "Maryland",
  "Delaware",
]);
// ─────────────────────────────────────────────────────────────────────────

const ALL_STATES = [
  "Alabama","Alaska","Arizona","Arkansas","California","Colorado",
  "Connecticut","Delaware","Florida","Georgia","Hawaii","Idaho",
  "Illinois","Indiana","Iowa","Kansas","Kentucky","Louisiana",
  "Maine","Maryland","Massachusetts","Michigan","Minnesota",
  "Mississippi","Missouri","Montana","Nebraska","Nevada",
  "New Hampshire","New Jersey","New Mexico","New York",
  "North Carolina","North Dakota","Ohio","Oklahoma","Oregon",
  "Pennsylvania","Rhode Island","South Carolina","South Dakota",
  "Tennessee","Texas","Utah","Vermont","Virginia","Washington",
  "West Virginia","Wisconsin","Wyoming"
];

// Stats
const total = ALL_STATES.length;
const visitedCount = VISITED.size;
document.getElementById('visited-count').textContent = visitedCount;
document.getElementById('unvisited-count').textContent = total - visitedCount;
document.getElementById('pct').textContent = Math.round(visitedCount / total * 100) + '%';

// State chip lists
const visitedList = document.getElementById('visited-list');
const unvisitedList = document.getElementById('unvisited-list');
[...ALL_STATES].sort().forEach(name => {
  const isV = VISITED.has(name);
  const chip = document.createElement('div');
  chip.className = `state-chip ${isV ? 'visited' : 'unvisited'}`;
  chip.innerHTML = `<span class="dot"></span>${name}`;
  (isV ? visitedList : unvisitedList).appendChild(chip);
});

// Tooltip
const tooltip = document.getElementById('tooltip');
const tipName = document.getElementById('tip-name');
const tipStatus = document.getElementById('tip-status');

function showTip(e, name) {
  const isV = VISITED.has(name);
  tipName.textContent = name;
  tipStatus.textContent = isV ? '✓ Visited' : 'Not visited';
  tipStatus.className = `tip-status ${isV ? 'visited' : 'unvisited'}`;
  tooltip.style.opacity = '1';
  moveTip(e);
}
function moveTip(e) {
  tooltip.style.left = (e.clientX + 14) + 'px';
  tooltip.style.top  = (e.clientY - 10) + 'px';
}
function hideTip() { tooltip.style.opacity = '0'; }

// Draw map using US Atlas TopoJSON (unprojected – Albers USA built in via projection)
const width = 960, height = 600;
const svg = d3.select('#us-map').attr('viewBox', `0 0 ${width} ${height}`);
const projection = d3.geoAlbersUsa().scale(1280).translate([width / 2, height / 2]);
const path = d3.geoPath().projection(projection);

d3.json('https://cdn.jsdelivr.net/npm/us-atlas@3/states-10m.json').then(us => {
  const states = topojson.feature(us, us.objects.states);
  // State FIPS id → name lookup
  const fipsToName = {
    "01":"Alabama","02":"Alaska","04":"Arizona","05":"Arkansas","06":"California",
    "08":"Colorado","09":"Connecticut","10":"Delaware","12":"Florida","13":"Georgia",
    "15":"Hawaii","16":"Idaho","17":"Illinois","18":"Indiana","19":"Iowa",
    "20":"Kansas","21":"Kentucky","22":"Louisiana","23":"Maine","24":"Maryland",
    "25":"Massachusetts","26":"Michigan","27":"Minnesota","28":"Mississippi",
    "29":"Missouri","30":"Montana","31":"Nebraska","32":"Nevada","33":"New Hampshire",
    "34":"New Jersey","35":"New Mexico","36":"New York","37":"North Carolina",
    "38":"North Dakota","39":"Ohio","40":"Oklahoma","41":"Oregon","42":"Pennsylvania",
    "44":"Rhode Island","45":"South Carolina","46":"South Dakota","47":"Tennessee",
    "48":"Texas","49":"Utah","50":"Vermont","51":"Virginia","53":"Washington",
    "54":"West Virginia","55":"Wisconsin","56":"Wyoming"
  };

  svg.selectAll('.state-path')
    .data(states.features)
    .enter()
    .append('path')
    .attr('class', d => {
      const name = fipsToName[String(d.id).padStart(2,'0')];
      return `state-path ${VISITED.has(name) ? 'visited' : 'unvisited'}`;
    })
    .attr('d', path)
    .on('mousemove', (e, d) => {
      const name = fipsToName[String(d.id).padStart(2,'0')];
      if (name) showTip(e, name);
    })
    .on('mousemove', (e, d) => {
      const name = fipsToName[String(d.id).padStart(2,'0')];
      if (name) { showTip(e, name); moveTip(e); }
    })
    .on('mouseleave', hideTip);

  // State borders
  svg.append('path')
    .datum(topojson.mesh(us, us.objects.states, (a, b) => a !== b))
    .attr('fill', 'none')
    .attr('stroke', '#141414')
    .attr('stroke-width', 0.8)
    .attr('d', path);
});
</script>
</body>
</html>
